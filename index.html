<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Disrupt10n Video Landing</title>
  <style>
    :root {
      --bg: #000;
      --hotspot-border: rgba(255,255,255,.55);
      --hotspot-fill: rgba(255,255,255,.08);
      --hotspot-fill-hover: rgba(255,255,255,.16);
      --hotspot-glow: 0 0 0 1px rgba(255,255,255,.18), 0 8px 30px rgba(0,0,0,.35);
      --video-x: 50%;
      --video-y: 22%;
      --one-left: 14%;
      --one-top: 73%;
      --one-width: 28%;
      --two-left: 52%;
      --two-top: 73%;
      --two-width: 30%;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html,body{width:100%;height:100%;background:var(--bg);overflow:hidden}
    body{min-height:100vh;min-height:100svh;min-height:100dvh;font-family:Arial,sans-serif}
    .stage{position:fixed;inset:0;width:100vw;height:100vh;height:100svh;height:100dvh;background:var(--bg);overflow:hidden}
    video{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:var(--video-x) var(--video-y);background:var(--bg)}
    .overlay{position:absolute;inset:0;z-index:2;pointer-events:none}
    .hotspot{position:absolute;display:flex;align-items:center;justify-content:center;pointer-events:auto;border:1px solid var(--hotspot-border);background:var(--hotspot-fill);backdrop-filter:blur(2px);border-radius:999px;box-shadow:var(--hotspot-glow);transition:transform .2s ease,background .2s ease,border-color .2s ease;min-width:44px;min-height:44px;color:#fff;text-decoration:none;text-align:center;padding:.25rem .45rem;font-weight:700;line-height:1.05}
    .hotspot:hover,.hotspot:focus-visible{transform:scale(1.03);background:var(--hotspot-fill-hover);border-color:rgba(255,255,255,.9);outline:none}
    .hotspot span{font-size:clamp(.72rem,1.2vw,1rem);display:block}
    .event-one{left:var(--one-left);top:var(--one-top);width:var(--one-width);height:clamp(2.1rem,4.5vw,3rem)}
    .event-two{left:var(--two-left);top:var(--two-top);width:var(--two-width);height:clamp(2.1rem,4.5vw,3rem)}
    @media (max-width: 1000px){
      :root{--video-y:50%;--one-top:74%;--two-top:74%;--one-left:10%;--two-left:52%;--one-width:32%;--two-width:34%}
    }
    @media (max-width: 700px){
      :root{--video-y:52%;--one-top:76%;--two-top:76%;--one-left:8%;--two-left:51%;--one-width:36%;--two-width:38%}
    }
    @media (max-width: 480px){
      :root{--video-y:54%;--one-top:79%;--two-top:79%;--one-left:6%;--two-left:50%;--one-width:40%;--two-width:42%}
      .hotspot{padding:.35rem .45rem}
      .hotspot span{font-size:.68rem}
    }
    @media (prefers-reduced-motion:reduce){.hotspot{transition:none}}
  </style>
</head>
<body>
  <main class="stage" aria-label="Fullscreen event video with clickable hotspots">
    <video autoplay muted loop playsinline webkit-playsinline preload="metadata" poster="poster.jpg">
      <source src="./DISRUPT10N - Website Concept (1).mp4" type="video/mp4" />
    </video>
    <div class="overlay">
      <a class="hotspot event-one" href="https://example.com/event-1" target="_blank" rel="noopener noreferrer" aria-label="Purchase tickets here for event 1"><span>Purchase tickets here</span></a>
      <a class="hotspot event-two" href="https://example.com/event-2" target="_blank" rel="noopener noreferrer" aria-label="Purchase tickets here for event 2"><span>Purchase tickets here</span></a>
    </div>
  </main>
</body>
</html>
