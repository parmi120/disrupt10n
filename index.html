<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Disrupt10n Video Landing</title>
  <style>
    :root {
      --bg: #000;
      --video-x: 50%;
      --video-y: 22%;

      --btn-left: clamp(3rem, 14vw, 18%);
      --btn-top: clamp(70%, 74vh, 78%);
      --btn-width: clamp(12rem, 26vw, 24rem);
      --btn-height: clamp(2.8rem, 5vw, 3.6rem);
      --btn-pad-x: clamp(1rem, 1.4vw, 1.35rem);
      --btn-radius: clamp(12px, 1vw, 16px);
      --btn-font: clamp(0.8rem, 1vw, 1rem);

      --btn-border: rgba(255, 230, 120, 0.66);
      --btn-border-hover: rgba(255, 230, 120, 0.96);
      --btn-bg: rgba(10, 16, 26, 0.16);
      --btn-bg-hover: rgba(20, 28, 40, 0.28);
      --btn-text: #fff8d6;
      --btn-shadow:
        0 0 0 1px rgba(255, 220, 110, 0.08),
        0 10px 30px rgba(0, 0, 0, 0.30);

      --ig-top: clamp(0.25rem, 0.9vw, 0.75rem);
      --ig-right: clamp(8.75rem, 0.9vw, 0.75rem);
      --ig-size: clamp(6rem, 8vw, 7rem);
    }

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      width: 100%;
      height: 100%;
      background: var(--bg);
      overflow: hidden;
    }

    body {
      min-height: 100dvh;
      font-family: Arial, sans-serif;
    }

    .stage {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100dvh;
      background: var(--bg);
      overflow: hidden;
    }

    video {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: var(--video-x) var(--video-y);
      background: #111;
    }

    .overlay {
      position: absolute;
      inset: 0;
      z-index: 2;
      pointer-events: none;
    }

    .instagram-hitbox {
      position: absolute;
      top: var(--ig-top);
      right: var(--ig-right);
      width: var(--ig-size);
      height: var(--ig-size);
      pointer-events: auto;
      z-index: 3;
      background: transparent;
      border-radius: 999px;
    }

    .hotspot {
      position: absolute;
      left: var(--btn-left);
      top: var(--btn-top);
      width: var(--btn-width);
      min-width: 10rem;
      height: var(--btn-height);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.55rem;
      pointer-events: auto;
